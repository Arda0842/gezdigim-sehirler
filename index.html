<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Türkiye Gezi Haritam</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --card: #1e2235;
    --visited: #e07a45;
    --visited-h: #f09a65;
    --idle: #2d3a5e;
    --idle-h: #3d4e7a;
    --border: #ffffff13;
    --text: #e8e8f0;
    --muted: #7880a8;
    --accent: #e07a45;
    --stroke: #0a0d18;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background:var(--bg); color:var(--text);
    font-family:'Nunito',sans-serif; min-height:100vh;
    background-image:
      radial-gradient(ellipse at 15% 10%,#1a2044 0%,transparent 55%),
      radial-gradient(ellipse at 85% 90%,#1a1530 0%,transparent 55%);
  }
  header { text-align:center; padding:36px 24px 12px; }
  header h1 {
    font-family:'Playfair Display',serif;
    font-size:clamp(1.6rem,5vw,2.6rem);
    background:linear-gradient(135deg,#f5d0a0,#e07a45,#c85070);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    background-clip:text; margin-bottom:4px;
  }
  header p { color:var(--muted); font-size:.88rem; }

  .stats { display:flex; justify-content:center; gap:14px; padding:14px 24px 10px; flex-wrap:wrap; }
  .stat {
    background:var(--card); border:1px solid var(--border);
    border-radius:14px; padding:12px 22px; text-align:center; min-width:94px;
  }
  .num {
    font-family:'Playfair Display',serif; font-size:2rem;
    color:var(--accent); line-height:1;
  }
  .num.bump { animation:bump .3s ease; }
  @keyframes bump { 0%{transform:scale(1)} 50%{transform:scale(1.32)} 100%{transform:scale(1)} }
  .lbl2 { font-size:.66rem; color:var(--muted); text-transform:uppercase; letter-spacing:1.3px; margin-top:3px; }

  .prog-wrap { max-width:500px; margin:0 auto 4px; padding:0 24px; }
  .prog-track { background:var(--card); border-radius:99px; height:6px; overflow:hidden; border:1px solid var(--border); }
  .prog-fill {
    height:100%; background:linear-gradient(90deg,#e07a45,#b84060);
    border-radius:99px; transition:width .55s cubic-bezier(.34,1.56,.64,1); width:0%;
  }
  .prog-lbl { text-align:right; font-size:.67rem; color:var(--muted); margin-top:3px; }

  .map-wrap { padding:10px 10px 2px; max-width:1120px; margin:0 auto; }
  #map { width:100%; height:auto; filter:drop-shadow(0 6px 32px #000000bb); }

  .p {
    fill:var(--idle); stroke:var(--stroke); stroke-width:.5;
    cursor:pointer; transition:fill .15s ease;
  }
  .p:hover { fill:var(--idle-h); }
  .p.v { fill:var(--visited); }
  .p.v:hover { fill:var(--visited-h); }

  .mlbl {
    font-family:'Nunito',sans-serif;
    font-size:6.5px;
    font-weight:800;
    fill:rgba(255,255,255,0.88);
    text-anchor:middle;
    dominant-baseline:middle;
    pointer-events:none;
    user-select:none;
  }

  #tt {
    position:fixed; background:var(--card); border:1px solid var(--border);
    border-radius:10px; padding:8px 14px; font-size:.84rem; font-weight:700;
    pointer-events:none; opacity:0; transition:opacity .1s; z-index:999;
    box-shadow:0 6px 28px #00000088; white-space:nowrap;
  }
  #tt.on { opacity:1; }
  .ts { font-size:.69rem; font-weight:400; color:var(--muted); margin-top:2px; }
  .ts.v { color:var(--accent); }

  .section { max-width:1120px; margin:0 auto 52px; padding:0 20px; }
  .section h2 {
    font-family:'Playfair Display',serif; font-size:1.15rem;
    display:flex; align-items:center; gap:10px; margin-bottom:13px;
  }
  .section h2::after { content:''; flex:1; height:1px; background:var(--border); }

  .chips { display:flex; flex-wrap:wrap; gap:7px; min-height:34px; }
  .chip {
    background:var(--visited); color:#fff; border-radius:99px;
    padding:4px 13px; font-size:.78rem; font-weight:700; cursor:pointer;
    transition:background .15s, transform .1s;
    animation:pop .27s cubic-bezier(.34,1.56,.64,1);
  }
  .chip:hover { background:var(--visited-h); transform:scale(1.07); }
  @keyframes pop { from{transform:scale(.4);opacity:0} to{transform:scale(1);opacity:1} }
  .empty { color:var(--muted); font-size:.83rem; font-style:italic; }

  .reset {
    display:block; margin:14px auto 0;
    background:transparent; border:1px solid var(--border);
    color:var(--muted); padding:8px 20px; border-radius:99px;
    font-family:'Nunito',sans-serif; font-size:.8rem; cursor:pointer; transition:all .2s;
  }
  .reset:hover { border-color:var(--accent); color:var(--accent); }
  @media(max-width:480px){
    .stats{gap:9px} .stat{padding:10px 14px} .num{font-size:1.65rem}
  }
</style>
</head>

<header>
  <h1>🗺️ Türkiye Gezi Haritam</h1>

</header>

</div>

<div class="section">
  <h2>Gezilen Şehirler</h2>
  <div class="chips" id="chips">
    <span class="empty">Henüz hiç şehir seçilmedi — haritadan bir ile tıkla!</span>
  </div>
  <button class="reset" id="rst">🗑 Tümünü Sıfırla</button>
</div>

<div id="tt">
  <div id="tc"></div>
  <div class="ts" id="ts"></div>
</div>

<script>
  const TOTAL=81, KEY='tr-gezildi-v5';
  let vis=new Set(JSON.parse(localStorage.getItem(KEY)||'[]'));
  const tt=document.getElementById('tt'),tc=document.getElementById('tc'),ts=document.getElementById('ts');
  const chips=document.getElementById('chips');
  const cntEl=document.getElementById('cnt'),remEl=document.getElementById('rem'),
        pctEl=document.getElementById('pct'),bar=document.getElementById('bar'),
        blbl=document.getElementById('blbl');

  function save(){ localStorage.setItem(KEY,JSON.stringify([...vis])); }
  function bumpEl(el){ el.classList.remove('bump'); void el.offsetWidth; el.classList.add('bump'); }

  function render(){
    const n=vis.size;
    cntEl.textContent=n; remEl.textContent=TOTAL-n;
    pctEl.textContent='%'+Math.round(n/TOTAL*100);
    bar.style.width=(n/TOTAL*100)+'%';
    blbl.textContent=n+' / '+TOTAL+' il gezildi';
    [cntEl,remEl,pctEl].forEach(bumpEl);
    chips.innerHTML='';
    if(!vis.size){
      chips.innerHTML='<span class="empty">Henüz hiç şehir seçilmedi — haritadan bir ile tıkla!</span>';
      return;
    }
    [...vis].sort().forEach(city=>{
      const c=document.createElement('span');
      c.className='chip'; c.textContent=city; c.title='Kaldırmak için tıkla';
      c.onclick=()=>{
        vis.delete(city); save();
        document.querySelectorAll('.p').forEach(p=>{ if(p.dataset.city===city) p.classList.remove('v'); });
        render();
      };
      chips.appendChild(c);
    });
  }

  document.querySelectorAll('.p').forEach(p=>{
    const city=p.dataset.city;
    if(vis.has(city)) p.classList.add('v');
    p.addEventListener('click',()=>{
      if(vis.has(city)){ vis.delete(city); p.classList.remove('v'); }
      else{ vis.add(city); p.classList.add('v'); }
      save(); render();
    });
    p.addEventListener('mousemove',e=>{
      const v=vis.has(city);
      tc.textContent=city;
      ts.textContent=v?'✓ Gezildi':'Tıkla ve işaretle';
      ts.className='ts'+(v?' v':'');
      tt.style.left=(e.clientX+14)+'px'; tt.style.top=(e.clientY-10)+'px';
      tt.classList.add('on');
    });
    p.addEventListener('mouseleave',()=>tt.classList.remove('on'));
  });

  document.getElementById('rst').onclick=()=>{
    if(!confirm('Tüm işaretlemeler silinsin mi?')) return;
    vis.clear(); save();
    document.querySelectorAll('.p').forEach(p=>p.classList.remove('v'));
    render();
  };

  render();
</script>
